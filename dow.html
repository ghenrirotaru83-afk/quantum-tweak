    <div class="section-container" style="padding-top:120px; max-width:600px;">
        <div class="glass-card animate-in" style="padding:48px; text-align:center;">
            <span class="section-tag" style="margin-bottom:24px;">Secure Download</span>
            <h1 style="font-family:var(--display);font-size:3rem;font-weight:400;letter-spacing:0.08em;color:#fff;margin-bottom:8px;">Quantum Tweak</h1>
            <p style="color:var(--text-dim);margin-bottom:40px;font-size:0.95rem;">Always stay up to date with the best tweaks.</p>

            <div style="margin:40px 0;">
                <div id="versionTag" class="section-tag" style="margin-bottom:24px;display:inline-flex;">v1.0.0</div>
                <br>
                <input type="password" id="keyInput" placeholder="Enter access key" style="background:rgba(255,255,255,0.02);border:1px solid var(--border-silver);color:#fff;padding:10px;border-radius:var(--radius);margin-bottom:20px;">
                <button id="dlBtn" class="btn btn-primary btn-lg" style="font-size:15px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Quantum_Tweak.py
                </button>
                <p id="message"style="color:var(--text-dim);margin-top:25px;">message</p>
            </div>

            <div style="background:rgba(255,255,255,0.02);border-radius:var(--radius);padding:20px;border:1px solid var(--border-silver);">
                <div style="display:flex;justify-content:space-around;font-size:13px;font-family:var(--mono);letter-spacing:0.08em;">
                    <div style="color:var(--text-muted);">Status: <span style="color:#44bb44;">Updatet</span></div>
                    <div style="color:var(--text-muted);">Last Update: <span id="lastUpdate" style="color:var(--silver-light);">Today</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const ZIP_FILENAME = 'quantum-tweak.zip';
    const SECRET_KEY = '1234'; // 🔑 your key here

    function verifyAndDownload() {
      const inputKey = document.getElementById('keyInput').value;
      const message = document.getElementById('message');

      if (inputKey === SECRET_KEY) {
        message.style.color = 'green';
        message.textContent = '✅ Key accepted! Starting download...';
        downloadZip();
      } else {
        message.style.color = 'red';
        message.textContent = '❌ Invalid key. Access denied.';
      }
    }

    function downloadZip() {
      const link = document.createElement('a');
      link.href = ZIP_FILENAME;
      link.download = ZIP_FILENAME;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
    document.getElementById('dlBtn').addEventListener('click', verifyAndDownload);
